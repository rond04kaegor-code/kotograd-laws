            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            animation: bgPulse 8s infinite alternate;
        }

        @keyframes bgPulse {
            0% { backdrop-filter: brightness(1); }
            100% { backdrop-filter: brightness(1.05); }
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            z-index: 0;
            animation: overlayGlow 6s infinite alternate;
        }

        @keyframes overlayGlow {
            0% { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(3px); }
            100% { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(2px);
            animation: cardFloat 1s ease-out;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: scale(0.96) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .main-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 60px rgba(0,0,0,0.35);
        }

        header {
            background: linear-gradient(135deg, #1e3a2f, #0f2a20);
            padding: 2rem 2rem;
            color: white;
            border-bottom: 4px solid #ffd966;
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: "⚡🐱🚒";
            position: absolute;
            bottom: -10px;
            right: 20px;
            font-size: 70px;
            opacity: 0.1;
            pointer-events: none;
            animation: driftIcon 12s infinite linear;
        }

        @keyframes driftIcon {
            0% { transform: translateX(0) rotate(0deg); opacity: 0.08; }
            50% { transform: translateX(-30px) rotate(5deg); opacity: 0.15; }
            100% { transform: translateX(0) rotate(0deg); opacity: 0.08; }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            background: linear-gradient(120deg, #fff, #ffd966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 2px #ffd966; }
            100% { text-shadow: 0 0 12px #ffd966; }
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .columns {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            padding: 2rem;
            background: #f9f9f0;
        }

        .law-section {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: 1px solid #f0e0b0;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }

        .law-section:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 32px rgba(0,0,0,0.12);
            border-color: #ffd966;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            background: #fff3e0;
            padding: 1rem 1.2rem;
            font-weight: 800;
            font-size: 1.3rem;
            color: #1e3a2f;
            border-left: 6px solid #ffd966;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: 0.2s;
        }

        .section-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            background: white;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .law-list {
            max-height: 58vh;
            overflow-y: auto;
            padding: 0.8rem;
        }

        .law-item {
            padding: 0.9rem 1rem;
            margin: 0.5rem 0.2rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            border-left: 3px solid transparent;

            function renderLawList(containerId, laws) {
                const containerEl = document.getElementById(containerId);

                    div.innerHTML = `

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
